<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220">
  <defs>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45" />
    </filter>
    <radialGradient id="blobA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e3a8a" stop-opacity="0.85" />
      <stop offset="60%" stop-color="#1e40af" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="blobB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0c4a6e" stop-opacity="0.85" />
      <stop offset="60%" stop-color="#0369a1" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#0c4a6e" stop-opacity="0" />
    </radialGradient>
  </defs>

  <circle cx="200" cy="110" r="130" fill="url(#blobA)" filter="url(#blur)">
    <animate attributeName="cx" values="200;420;200" dur="9s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
    <animate attributeName="cy" values="110;80;110" dur="9s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
    <animate attributeName="r" values="130;160;130" dur="9s" repeatCount="indefinite" />
  </circle>

  <circle cx="600" cy="110" r="130" fill="url(#blobB)" filter="url(#blur)">
    <animate attributeName="cx" values="600;380;600" dur="11s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
    <animate attributeName="cy" values="110;140;110" dur="11s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" />
    <animate attributeName="r" values="130;150;130" dur="11s" repeatCount="indefinite" />
  </circle>
</svg>